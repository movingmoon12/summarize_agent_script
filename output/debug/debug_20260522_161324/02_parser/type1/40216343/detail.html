<strong id="title" style="font-family:宋体;font-size:36px; color:#000080;" align="center">关于做好2026-2027年度中加学者交换项目遴选工作通知</strong>&#13;

<td style="font-family:仿宋_GB2312;font-size:16px;line-height:150%;" id="content" class="_c">&#13;
&#13;
<p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">各有关单位：</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">根据国家留学基金委《<span>2026</span>年国家留学基金资助出国留学人员选派指南》及《<span>2026-2027</span>年度中加学者交换项目遴选通知》等文件精神，<span>2026-2027</span>年度中加学者交换项目遴选工作即将开始，结合我校实际，现将有关事项通知如下：</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 16pt;">一、申请类别及留学期限</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">访问学者，留学期限<span>4-12</span>个月。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 16pt;">二、资助内容</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（一）国家留学基金将承担项目留学人员中加间一次往返旅费。加方将承担加拿大中转期间最高<span>350</span>加元的食宿费用。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（二）加方将按月向项目留学人员提供奖学金生活费（奖学金标准以加方通知为准），并负担留学人员的医疗保险费用。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 16pt;">三、申请条件</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（一）热爱祖国，具有良好的政治素质，身心健康。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（二）具有中国国籍，不具有国外永久居留权，来校工作满<span>2</span>年。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（三）年龄不超过<span>50</span>周岁（<span>1975</span>年<span>1</span>月<span>1</span>日以后出生）。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（四）外语水平应符合国家留学基金资助出国留学外语条件（<span>https://www.csc.edu.cn/article/2514</span>）及拟留学单位的语言要求。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">申请时外语水平未达到派出要求者，如所在单位重点推荐，亦可申请，但须提供可反映其外语水平的考试证明，此类人员如通过评审被录取，须达到外语条件后方可派出。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（五）申请时须已获国外高校或科研机构正式邀请信。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（六）符合《苏州大学教师公派出国（境）管理暂行办法（<span>2022</span>年修订）》（苏大人〔<span>2022</span>〕<span>4</span>号）相关要求。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（七）曾享受国家留学基金资助出国留学、回国后服务满两年以上方可申请。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 16pt;">四、评选标准</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（一）申请人须具备相当熟练的英语或法语听说读写能力，以在加拿大大学开展研究项目。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（二）申请人须经所在单位同意后方可申请本项目。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（三）申请人在加拿大指定的各省或地区政府批准的可接受国际学生的学习机构从事有关加拿大的研究。“加拿大研究”的领域侧重于社会科学和人文学科，包括：商科、经济学、法律、国际关系、历史、政治、社会学、地理、艺术、英语或法语文学、语言学、教育学、传播政策、社会管理、环境研究、建筑学及其它相关领域。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（四）在提交的研究计划中展示作为候选人的学术成就。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（五）研究课题旨在促进对加拿大认识和了解。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（六）研究课题能够在申请人回国后在中国产生广泛影响，如出版专著、在著名学术刊物上发表论文，亦可通过其它方式使其研究成果在中国得以更广泛地传播。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（七）候选人回国后将致力于宣传和推广其学术研究，促进中国对加拿大的了解。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 16pt;">五、申报及材料要求</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（一）此次申报采取网上报名与提交书面材料相结合的方式。<b><u><span>6</span>月<span>26</span>日<span>14</span>时前</u></b>申请人可登录国家公派留学信息管理系统（<span>https://sa.csc.edu.cn</span>）进行报名，按照<span>“</span>申请材料及说明<span>”</span>（见附件<span>1</span>）准备书面申请材料，并按顺序装订。书面申请材料由申请人所在学院（部）汇总后统一提交。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（二）申请人完成网上报名后，需将申请材料电子版合并为一份<span>PDF</span>文件，文件命名格式：申请人姓名拼音（姓、名分开，大写）；邮件主题命名格式：<span>2026</span>年中加学者项目<span>+</span>姓名拼音（姓、名分开，大写），于<b><u><span>6</span>月<span>26</span>日<span>14:00</span>前</u></b>发送至<span>tyuliu@suda.edu.cn</span>。</span></p><p style="margin: 0cm 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（三）请各学院（部）认真审核材料，填写《单位推荐意见表》，签字并加盖单位公章，同时将《单位推荐意见表》中推荐意见录入<span>word</span>文档并发至邮箱<span>tyuliu@suda.edu.cn</span>。</span></p>&#13;
