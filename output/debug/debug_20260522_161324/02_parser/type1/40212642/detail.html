<strong id="title" style="font-family:宋体;font-size:36px; color:#000080;" align="center">关于组织申报可持续发展国际合作科学计划2026年度项目指南（第一批补充）的通知</strong>&#13;

&#13;
<p style="font-family: 宋体; font-size: 16px;"/><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">各有关单位：</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">根据国家自然科学基金委员会网站通知，可持续发展国际合作科学计划</font><font face="仿宋">2026年度项目指南（第一批补充）的申报通知已经发布，现将有关事项通知如下</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">：</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">为实施更加开放包容、互惠共享的国际科技合作战略，推动实现联合国可持续发展目标，助力构建人类命运共同体，国家自然科学基金委员会（以下简称</font><font face="仿宋">“自然科学基金委”或“NSFC”）广泛联合国际组织以及各国科研资助机构，发起可持续发展国际合作科学计划（Sustainable Development International Cooperation Program，以下简称“科学计划”或“SDIC”），共同开展面向全球挑战的科学研究，促进双多边国际交流与合作，拓展国际合作空间。</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">2026年度，科学计划将发布两批指南，包括组织间合作及战略性研究两类。现补充发布2类组织间合作项目，参与合作的外方资助机构包括瑞典研究理事会（VR）和国际竹藤组织（INBAR）。</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">一、</font></span><span style="font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">总体科学目标</font></span><span style="font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">联合国《</font><font face="仿宋">2030可持续发展议程》的17项可持续发展目标（SDGs）相互关联、彼此促进又相互制衡，系统把握SDGs之间的协同关联与潜在矛盾，对统筹实现可持续发展三大核心维度——经济发展、社会包容与环境保护的平衡具有重要意义。</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">实现可持续发展是全球治理与构建人类命运共同体的核心使命，而全球变化已成为当前人类可持续发展面临的重大挑战之一。本科学计划直面全球可持续发展的系统性挑战，聚焦联合国</font><font face="仿宋">2030年可持续发展议程的关键目标，围绕“应对全球共同挑战”与“布局关键战略领域”两大主线，开展跨国界、跨学科的系统性研究，推动可持续发展从科学认知迈向实践路径。重点聚焦“一带一路”共建国家及全球典型区域，开展多层次、多场景的区域集成研究，推动形成可复制、可推广的可持续发展模式，为构建人类命运共同体提供支撑，为相关国家和地区实现可持续发展提供科学决策依据。</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">二、</font></span><span style="font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">主要资助方向</font></span><span style="font-family: 楷体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">2026年度，科学计划将围绕全球可持续发展的关键挑战，结合全球共同挑战与国际科技前沿，主要围绕生命健康、资源绿色开发、生物多样性等领域与国际合作机构开展联合资助。</font></span><b><span style="font-family: 仿宋; font-size: 16pt; font-weight: bold; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">具体资助方向及要求，详见各资助机构及国际组织的项目说明</font></span></b><b><span style="font-family: 仿宋; font-size: 16pt; font-weight: bold; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">。</font></span></b><b><span style="font-family: 仿宋; font-size: 16pt; font-weight: bold; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></b></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 黑体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">三、</font></span><span style="font-family: 黑体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">遴选项目的基本原则</font></span><span style="font-family: 黑体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">(一)项目申请应以实现两个及以上联合国SDGs为目标，面向相关国家可持续发展面临的实际挑战，提炼基础科学问题开展研究。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">(二)鼓励开展前沿领域探索性研究，优先支持具有原创性的新概念、新理论、新方法和新技术的研究。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">(三)项目申请应突出对青年人才的培养和国际合作网络建设（特别是多边合作）。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">(四)鼓励来自不同学科领域的研究队伍联合申请，促进学科交叉。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 黑体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">四、</font><font face="黑体">2026年度资助计划</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="楷体">(一)资助类型及规模</font></span><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">拟资助</font><font face="仿宋">“合作交流项目”不超过10项,“在华研讨会项目”不超过2项：</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><div align="center"><table style="border: currentColor; border-image: none; width: 89.98%; border-collapse: collapse; mso-border-left-alt: 0.7500pt outset windowtext; mso-border-top-alt: 0.7500pt outset windowtext; mso-border-right-alt: 0.7500pt outset windowtext; mso-border-bottom-alt: 0.7500pt outset windowtext; mso-border-insideh: 0.7500pt outset windowtext; mso-border-insidev: 0.7500pt outset windowtext; mso-padding-alt: 0.7500pt 0.7500pt 0.7500pt 0.7500pt;" border="1" cellspacing="0">  <tbody>    <tr>      <td width="164" valign="center" style="background: rgb(255, 255, 255); padding: 0.75pt; border: 1pt outset windowtext; width: 123.1pt; mso-border-left-alt: 0.7500pt outset windowtext; mso-border-top-alt: 0.7500pt outset windowtext; mso-border-right-alt: 0.7500pt outset windowtext; mso-border-bottom-alt: 0.7500pt outset windowtext;">      <p align="ce nter" style="background: rgb(255, 255, 255); border-width: medium 1pt 1pt medium; border-style: none outset outset none; border-color: currentColor windowtext windowtext currentColor; padding: 0.75pt; width: 133.8pt; mso-border-left-alt: none; mso-border-top-alt: 0.7500pt outset windowtext; mso-border-right-alt: 0.7500pt outset windowtext; mso-border-bottom-alt: 0.7500pt outset windowtext;">      <p align="center" class="p" style="text-align: center; margin-right: 0px; mso-pagination: widow-orphan;" dir="ltr"><span style="color: rgb(0, 0, 0); text-transform: none; letter-spacing: 0pt; font-family: 仿宋; font-size: 16pt; font-style: normal; mso-font-kerning: 0.0000pt;"><font face="仿宋">-</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-font-kerning: 0.0000pt;"><o:p/></span></p>      </td>    </tr>    <tr>      <td width="164" valign="center" style="background: rgb(255, 255, 255); border-width: medium 1pt 1pt; border-style: none outset outset; border-color: currentColor windowtext windowtext; padding: 0.75pt; width: 123.1pt; mso-border-left-alt: 0.7500pt outset windowtext; mso-border-top-alt: 0.7500pt outset windowtext; mso-border-right-alt: 0.7500pt outset windowtext; mso-border-bottom-alt: 0.7500pt outset windowtext;">      <p align="center" class="p" style="text-align: center; margin-right: 0px; mso-pagination: widow-orphan;" dir="ltr"><span style="color: rgb(0, 0, 0); text-transform: none; letter-spacing: 0pt; font-family: 仿宋; font-size: 16pt; font-style: normal; mso-font-kerning: 0.0000pt;"><font face="仿宋">国际竹藤组织</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-font-kerning: 0.0000pt;"><o:p/></span></p>      </td>      <td width="157" valign="center" style="background: rgb(255, 255, 255); border-width: medium 1pt 1pt medium; border-style: none outset outset none; border-color: currentColor windowtext windowtext currentColor; padding: 0.75pt; width: 118.15pt; mso-border-left-alt: none; mso-border 习/培训班等多种交流活动。“在华研讨会项目”旨在支持中外科研人员召开在华学术会议。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="楷体">(二)资助期限</font></span><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">1.“合作交流项目”资助期限为2年，申请书中的研究期限应填写2027年1月1日至2028年12月31日。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">2.“在华研讨会项目”资助期限为1周，申请书中的研究期限应填写2027年1月1日至2027年12月31日。。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 黑体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">五、申请注意事项</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">科学计划框架下的</font><font face="仿宋">“合作交流项目”及“在华研讨会项目”属于国际（地区）合作交流项目。</font></span><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="楷体">(一) 申请条件</font></span><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">1.中方申请人须是2027年12月31日（含）以后结题的3年期（含）以上国家自然科学基金在研项目（合作交流项目除外）的项目负责人或主要参与者。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">2.在研项目的主要参与者作为中方申请人须具有高级专业技术职务（职称）或者博士学位，或者有2名与其研究领域相同、具有高级专业技术职务（职称）的科学技术人员推荐，并经在研项目负责人同意。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">3.外方合作者应符合各资助机构及国际组织的要求（详见各资助机构及国际组织的项目说明，其中外方合作者中的负责人简称“外方负责人”，默认为中文申请书“境外合作人员”栏目的第一人）。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">4.更多申请人条件的详细说明请见《2026年度国家自然科学基金项目指南》。</font></span><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="楷体">(二) 限项申请规定</font></span><span style="font-family: 楷体; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">1.不计入“高级专业技术职务（职称）人员申请和承担项目总数限2项”的范围。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">2.不受“申请人同年只能申请1项同类型项目”规定的限制。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">3.作为申请人申请和作为项目负责人承担的各类SDIC项目，合计限1项。申请当年资助期满的项目不计入统计范围。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">4.《2026年度国家自然科学基金项目指南》中关于申请数量的其他限制。</font></span><span style="font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">项目申报指南、申报方法及注意事项详见国家自然科学基金委员会网站，网址：</font><font face="仿宋">https://www.nsfc.gov.cn/p1/3381/2824/123512.html</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">。</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">请拟申报本项目的教师于</font><font face="仿宋">2026年</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">6</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">月</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">15</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">日前登陆国家自然科学基金网络信息系统（</font><font face="仿宋">https://grants.nsfc.gov.cn）在线完成申请书的填报，并以附件形式上传相关材料。</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">本项目纳入无纸化申请范围，项目获批准后，申请人须将申请书的纸质签字盖章页装订在《资助项目计划书》最后，一并提交。签字盖章的信息应与电子申请书严格保持一致。</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p align="justify" class="MsoNormal" style="text-align: justify; line-height: 29pt; text-indent: 32pt; margin-top: 7.8pt; -ms-text-autospace: ideograph-numeric; -ms-text-justify: inter-ideograph; mso-para-margin-top: 0.5000gd; mso-pagination: none; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">未尽事宜，请与科学技术研究院</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">基础研究</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">办公室</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">葛辰</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">、杨敏</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">、</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">雷翔宇</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">联系，电话：</font><font face="仿宋">67507192，我们将热忱为您服务。</font></span><span style="font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p>&#13;
