<strong id="title" style="font-family:宋体;font-size:36px; color:#000080;" align="center">关于推荐教师参加“2026年江苏高校外国留学生教学观摩比赛”的通知</strong>&#13;

&#13;
<p align="center" style="margin: 0pt; text-align: center; line-height: 30pt; font-family: Calibri; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"/><p style="margin: 0pt; text-align: justify; line-height: 29pt; font-family: Calibri; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">各学院（部）、有关单位：</font></span></p><p style="margin: 0pt; text-align: justify; line-height: 29pt; font-family: Calibri; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">   为深入贯彻落实全省教育外事工作部署，积极推进</font><font face="仿宋">“留学江苏”品牌建设，持续提升来华留学生培养质量，江苏高校外国留学生教学观摩比赛将于</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">近期开</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">展。该项比赛是全省普通高校教师教学竞赛省级赛事，由江苏省教育厅和江苏省高教学会指导、江苏省高教学会外国留学生教育管理研究委员会主办。现就我校遴选推荐工作通知如下：</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="15" style="line-height: 30pt; text-indent: -36pt; margin-left: 64pt; mso-line-height-rule: exactly; mso-char-indent-count: 0.0000; mso-list: l0 level1 lfo1;"><!--[if !supportLists]--><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><span style="mso-list: Ignore;">一、<span> </span></span></span><!--[endif]--><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">比赛</font></span><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">安排</font></span><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">2026年江苏高校外国留学生教学观摩比赛设</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;">4</span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">个赛道，分别为</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">全英文授课课程（含本科理工、本科文科、本科农医药</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;">)</span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">、国际中文教育、中国国情教育（含综合概况类和专业特色类课程）和留学生课程教学创新。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">中国国情教育赛道和留学生课程教学创新赛道的参赛课程须为全英文授课课程。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">二、参赛要求</font></span><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">1.参赛教师能坚持立德树人、爱生敬业，在外国留学生教学实践中不断改革创新、因材施教，授课能力突出，教学水平和教学效果获得本校外国留学生普遍认可。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">2. 所有教师均以个人形式参赛，其参赛课程应</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">正式列入</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">我校</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">外国学历留学生培养方案且已完成至少两个教学轮次的授课（年龄小于</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;">35</span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">岁的青年教师可不受此限制）</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">3.参赛课程教学目标明确、教学内容重点突出、教学方法运用得当、教学风格生动活泼，课程注重知识传授和能力培养，教学效果好，具有较强的示范性。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">4.我校参加过前四年江苏高校外国留学生教学观摩比赛并获特等奖的教师，可以参加本年度不同</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">赛道</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">的比赛。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">三、参赛</font></span><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">课程内容和形式</font></span><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">1.资料、资格审查采用线上或线下审查的方式进行，组委会将对参赛教师的资格等进行网络公示，接受社会监督。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">2.所有参赛者须明确声明作品原创性，签署《知识产权承诺书》（附件5），并经学校审核盖章后，在系统提交申报材料时上传盖章件。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">3.除留学生课程教学创新赛道外的其他赛道，参赛教师赛前均需选取某一特定课程中的两堂课（每堂课45－50分钟），进行课程教学方案设计，并在赛事平台提交《2026年江苏高校外国留学生教学观摩比赛教学设计（教案）》（附件2）和与之对应的其中一个课堂教学实录视频。两堂课必须是该课程中第三章之后（包括第三章）以及最后一章之前的主要授课内容。国际中文教育课程的选题范围限定为汉语听说读写（相当于</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt; mso-fareast-font-family: 仿宋;">HSK</span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">3级）的教学内容。评分标准详见《2026年江苏高校外国留学生教学观摩比赛评分表》<span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">（附件</font><font face="仿宋">4）。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></font></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">4.留学生课程教学创新赛道的参赛教师需在赛事平台提交课堂教学实录视频、教学创新成果报告等材料。教学创新成果报告应基于参赛课程的教学实践经验与反思，体现课程教学的创新举措、过程与成效。聚焦教学实践的“真实问题”，通过课程内容的重构、教学方法的创新、教学环境的创设、教学评价的改革等，采用教学实验研究的范式解决教学问题，明确教学成效及其推广价值。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">5.所有赛道要求提交的课堂教学实录视频应是一个1学时的完整教学实录，按1个视频文件上传。视频须全程连续录制，参赛教师必须出镜，要有学生的镜头。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">四、比赛程序和时间安排</font></span><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">参赛教师按照全英文授课</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; font-weight: normal; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">普通本科理工组、普通本科文科组、普通本科农医药组、国际中文教育组、中国国情教育组和留学生课程教学创新组</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">分别报名参赛。赛程分为资格审查、现场比赛两个阶段。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">1.资格审查：各高校在2026年6月30日之前将推荐课程参赛材料上传至赛事平台。2026年7月省学会将组织专家对各高校推荐参赛人员和参赛课程材料进行资料和资格审查，并确定进入现场比赛的教师名单。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">2.现场比赛：进入现场比赛的教师于2026年11月进行线下教学展示与观摩交流，具体安排另行通知。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="黑体">五、申报程序和具体要求</font></span><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><font face="仿宋">1.请各学院（部）及有关单位按照通知要求认真组织申报工作，填写《2026年江苏高校外国留学生教学观摩比赛报名汇总表》（附件1）。</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt;"><o:p/></span></p><p class="MsoNormal" style="line-height: 30pt; text-indent: 32pt; mso-line-height-rule: e
