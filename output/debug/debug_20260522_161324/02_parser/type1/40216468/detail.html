<p style="font-family: 宋体; font-size: 16px;"/><p style="margin: 0cm; text-align: justify; line-height: 27pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">各团委、直属团支部：</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">为深入学习贯彻习近平新时代中国特色社会主义思想，深入贯彻党的二十大和二十届历次全会精神，认真落实党的二十届四中全会工作部署，全面贯彻习近平总书记关于青年工作的重要思想，充分发挥共青团育人功能，切实赋能青年成长成才，为有意向报名大学生志愿服务西部计划、江苏大学生志愿服务乡村振兴计划及其他服务基层项目的学生提供有针对性的就业指导，经研究决定，举办团团赋能计划之服务基层项目面试指导讲座。现将有关事项通知如下：</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">一、活动时间</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman Regular&quot;; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月</span><span style="font-family: &quot;Times New Roman Regular&quot;; font-size: 15pt;">21</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">日（星期四）</span><span style="font-family: &quot;Times New Roman Regular&quot;; font-size: 15pt;">19:00-20:30</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">二、主讲嘉宾</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">高鑫磊，苏州阳光公考面试高级讲师，从事公职类考试面试辅导</span><span style="font-family: &quot;Times New Roman Regular&quot;; font-size: 15pt;">9</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">年以上，对各类招考面试及公益性招考等有深入研究。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">三、参与方式</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">下载腾讯会议客户端，进入指定会议室观看线上直播。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">会议</span><span style="font-family: &quot;Times New Roman Regular&quot;; font-size: 15pt;">ID</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">：</span><span style="font-family: &quot;Times New Roman Regular&quot;; font-size: 15pt;">616-130-086</span></p><p align="center" style="margin: 0cm; text-align: center; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span><img width="197" height="189" src="/defaultroot/upload/html/20260520165126590001.jpg"/></span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">四、活动要求</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">请各学院（部）团委积极组织、广泛发动，重点面向对服务基层项目感兴趣的学生进行宣传，切实做好我校毕业生就业服务工作。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman Regular&quot;; font-size: 15pt;"> </span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">联系人：张云</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">联系方式：</span><span style="font-family: &quot;Times New Roman Regular&quot;; font-size: 15pt;"><font face="Times New Roman">67161745</font></span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">特此通知。 </span></p><p/>&#13;
