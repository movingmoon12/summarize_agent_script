<strong id="title" style="font-family:宋体;font-size:36px; color:#000080;" align="center"> 关于组织申报2026年度省前沿技术研发计划（卫生健康）项目的通知</strong>&#13;
<hr width="800px" size="3" align="center" color="#3F8080"/>&#13;
</td>&#13;

<tr valign="top">&#13;
<td style="font-family:仿宋_GB2312;font-size:16px;line-height:150%;" id="content" class="_c">&#13;
&#13;
<p style="font-family: 宋体; font-size: 16px;"/><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312;">各有关单位：</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312;">根据江苏省科学技术厅江苏省财政厅（苏科资发〔</span><span style="font-family: &quot;Times New Roman&quot;,serif;">2026</span><span style="font-family: 仿宋,仿宋_GB2312;">〕</span><span style="font-family: &quot;Times New Roman&quot;,serif;">27</span><span style="font-family: 仿宋,仿宋_GB2312;">号）文件通知，</span><span style="font-family: &quot;Times New Roman&quot;,serif;">2026</span><span style="font-family: 仿宋,仿宋_GB2312;">年度省前沿技术研发计划（卫生健康）项目申报指南（见附件</span><span style="font-family: &quot;Times New Roman&quot;,serif;">1</span><span style="font-family: 仿宋,仿宋_GB2312;">）已经发布，现将有关事项通知如下：</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体;">一</span><span style="font-family: 黑体;">、申报要求</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">1.</span><span style="font-family: 仿宋,仿宋_GB2312;">项目应具有明确的研发内容，符合指南领域和方向，完成基础理论创新，且能形成具有自主知识产权的技术、产品和装备，实施期满后具备临床应用条件。项目名称须科学规范，能够体现前沿技术的创新点或解决的关键核心问题，一般以</span><span style="font-family: 仿宋,仿宋_GB2312;">“</span><span style="font-family: &quot;Times New Roman&quot;,serif;">XXX</span><span><span><span><span><span><span style="font-family: 仿宋,仿宋_GB2312;">技术研发<span>”</span></span></span></span></span></span></span><span style="font-family: 仿宋,仿宋_GB2312;">作为后缀，不得与指南内容简单重复。本计划不受理涉密项目，申报材料中如有涉密内容需做脱密处理后再申报，并由项目主管部门按有关规定负责审查。对无实质创新研究内容项目和一般性技术应用与推广项目均不予受理。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">2.</span><span style="font-family: 仿宋,仿宋_GB2312;">项目应具有较好的研发基础，项目申报单位近年内须有有效授权专利等自主知识产权，项目负责人及团队具有较高的学术水平和创新能力，优先支持省级以上高层次人才团队牵头组织和申报项目。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">3.</span><span style="font-family: 仿宋,仿宋_GB2312;">申报单位为江苏省境内注册的具有独立法人资格的企业、医疗卫生机构、高等院校、科研院所、新型研发机构等，政府机关不得作为申报单位进行申报。申报单位应有较强的科技研发能力和条件，运行管理规范。鼓励企业牵头申报，鼓励医疗卫生机构联合生物医药等领域企业共同申报、协同开展创新药临床试验，鼓励医疗卫生机构向企业等开放应用场景，鼓励长三角地区产学研用协同攻关，重点项目必须有企业参与。多个单位联合申报的，应签订联合申报协议，并明确协议签署时间。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">4.</span><span style="font-family: 仿宋,仿宋_GB2312;">严格落实数据安全和个人信息保护相关规定，鼓励利用省域数据开展多中心研究。对指南内容的</span><span style="font-family: &quot;Times New Roman&quot;,serif;">1001</span><span style="font-family: 仿宋,仿宋_GB2312;">、</span><span style="font-family: &quot;Times New Roman&quot;,serif;">1002</span><span style="font-family: 仿宋,仿宋_GB2312;">、</span><span style="font-family: &quot;Times New Roman&quot;,serif;">1004</span><span style="font-family: 仿宋,仿宋_GB2312;">、</span><span style="font-family: &quot;Times New Roman&quot;,serif;">2002</span><span style="font-family: 仿宋,仿宋_GB2312;">等</span><span style="font-family: &quot;Times New Roman&quot;,serif;">4</span><span style="font-family: 仿宋,仿宋_GB2312;">个方向，项目须明确企业参与方式和应用场景，鼓励开放真实世界研究、专病队列等临床资源；依托项目建立的结构化数据集或数据库，须面向本省医药企业开放共享，支撑企业开展</span><span style="font-family: &quot;Times New Roman&quot;,serif;">AI</span><span style="font-family: 仿宋,仿宋_GB2312;">模型训练、人工智能验证、药物器械研发、临床试验设计等。项目验收时，须提供企业实质性参与证明或成果转化应用情况，以与企业签订的临床试验等相关协议材料为佐证。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">5.</span><span style="font-family: 仿宋,仿宋_GB2312;">申报单位须对照指南规定的项目类型和指南代码进行申报，一个项目填写一种项目类型和指南代码。重点项目的申报书须覆盖该指南方向中所有研发内容和考核指标。经费预算应根据项目研究任务实际需求，遵循目标相关性、政策相符性和经济合理性原则，不简单按省财政资金控制数和自筹比例设置。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">6.</span><span style="font-family: 仿宋,仿宋_GB2312;">项目研究要克服唯论文、唯职称、唯学历、唯奖项等倾向，按照《关于改进科技评价破除</span><span style="font-family: 仿宋,仿宋_GB2312;">“</span><span><span><span><span><span><span style="font-family: 仿宋,仿宋_GB2312;">唯论文<span>”</span></span></span></span></span></span></span><span style="font-family: 仿宋,仿宋_GB2312;">不良导向的若干措施（试行）》（苏科监发〔</span><span style="font-family: &quot;Times New Roman&quot;,serif;">2020</span><span style="font-family: 仿宋,仿宋_GB2312;">〕</span><span style="font-family: &quot;Times New Roman&quot;,serif;">135</span><span style="font-family: 仿宋,仿宋_GB2312;">号）要求，注重标志性成果的质量、贡献和影响。实施期满后一般须形成发明专利申请或授权，以及国家标准、行业标准等标准化研究成果。销售等经济指标不纳入考核范围。对于在关键创新指标上取得引领性、颠覆性创新成果的项目，其量化考核指标不作硬性要求。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">7.</span><span style="font-family: 仿宋,仿宋_GB2312;">项目严格按照《省科技厅关于印发〈江苏省科技计划项目合同制管理实施细则（试行）〉的通知》（苏科规范〔</span><span style="font-family: &quot;Times New Roman&quot;,serif;">2025</span><span style="font-family: 仿宋,仿宋_GB2312;">〕</span><span style="font-family: &quot;Times New Roman&quot;,serif;">4</span><span style="font-family: 仿宋,仿宋_GB2312;">号）的相关要求，开展实施管理和验收结题。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体;">二</span><span style="font-family: 黑体;">、组织方式</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">1.</span><span style="font-family: 仿宋,仿宋_GB2312;">项目采取竞争择优方式组织。我校限项</span><span style="font-family: &quot;Times New Roman&quot;,serif;">4</span><span style="font-family: 仿宋,仿宋_GB2312;">项，每个指南方向限报</span><span style="font-family: &quot;Times New Roman&quot;,serif;">1</span><span style="font-family: 仿宋,仿宋_GB2312;">项。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">2.</span><span style="font-family: 仿宋,仿宋_GB2312;">强化项目绩效评价管理，申报单位编制项目申报书应同步填报</span><span style="font-family: 仿宋,仿宋_GB2312;">“</span><span style="font-family: &quot;Times New Roman&quot;,serif;">2026</span><span style="font-family: 仿宋,仿宋_GB2312;">年度省前沿技术研发计划项目绩效目标申报表”</span><span style="font-family: 仿宋,仿宋_GB2312;">（附件</span><span style="font-family: &quot;Times New Roman&quot;,serif;">2</span><span style="font-family: 仿宋,仿宋_GB2312;">），作为项目立项评审的重要考量，并纳入项目立项后签订合同和项目实施后验收的相关内容。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">3.</span><span style="font-family: 仿宋,仿宋_GB2312;">项目受理后将进行形式审查，通过专家评审和现场考察等方式择优遴选项目。重点项目支持额度不超过</span><span style="font-family: &quot;Times New Roman&quot;,serif;">400</span><span style="font-family: 仿宋,仿宋_GB2312;">万元；面上项目支持额度不超过</span><span style="font-family: &quot;Times New Roman&quot;,serif;">80</span><span style="font-family: 仿宋,仿宋_GB2312;">万元。企业牵头申报的项目，省拨经费不超过项目总预算的</span><span style="font-family: &quot;Times New Roman&quot;,serif;">30%</span><span style="font-family: 仿宋,仿宋_GB2312;">。实施周期一般为</span><span style="font-family: &quot;Times New Roman&quot;,serif;">3</span><span style="font-family: 仿宋,仿宋_GB2312;">年左右。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">4.</span><span style="font-family: 仿宋,仿宋_GB2312;">不得将同一项目（依托同一建设内容、同一关键技术等同一核心内容编制的不同项目，视为同一项目）重复或同时申报省科技厅、省卫生健康委、省发展改革委、省工业和信息化厅等部门项目。凡属重复申报的，取消立项资格。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">5.</span><span style="font-family: 仿宋,仿宋_GB2312;">项目负责人须为申报单位的在职人员（与申报单位签订劳动合同），并确保在职期间能完成项目任务。鼓励创新药临床试验主要研究者牵头申报本计划项目，鼓励和支持</span><span style="font-family: &quot;Times New Roman&quot;,serif;">40</span><span style="font-family: 仿宋,仿宋_GB2312;">岁以下（</span><span style="font-family: &quot;Times New Roman&quot;,serif;">1986</span><span style="font-family: 仿宋,仿宋_GB2312;">年</span><span style="font-family: &quot;Times New Roman&quot;,serif;">1</span><span style="font-family: 仿宋,仿宋_GB2312;">月</span><span style="font-family: &quot;Times New Roman&quot;,serif;">1</span><span style="font-family: 仿宋,仿宋_GB2312;">日（含）以后出生）青年人才牵头或参与申报本计划项目，各主管部门推荐项目中由青年人才担任项目负责人和项目骨干的比例不低于</span><span style="font-family: &quot;Times New Roman&quot;,serif;">40%</span><span style="font-family: 仿宋,仿宋_GB2312;">。有在研省科技计划项目的项目负责人，不得牵头申报本年度省科技计划项目。同一项目负责人同一年度只能申报一项省科技计划项目。指南编制专家不得牵头或参与申报本计划项目。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">6.</span><span style="font-family: 仿宋,仿宋_GB2312;">鼓励项目申报单位采用租赁或共享专用仪器设备，对确有需要利用财政资金或国有资本购置大型科学仪器的项目，申报单位应说明所购置大型科学仪器的必要性并承诺遵守查重评议、开放共享等有关规定要求。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">7.</span><span style="font-family: 仿宋,仿宋_GB2312;">关于落实科研诚信及科技伦理要求。项目负责人、项目申报单位和项目主管部门均须签署科研诚信承诺书。项目申报单位和个人诚信状况良好，无在惩戒执行期内的科研失信行为记录和其他社会领域严重失信行为记录。在项目申报和立项过程中相关责任主体有抄袭剽窃、弄虚作假、侵犯他人知识产权等失信行为的，将按《江苏省科技计划项目信用管理办法》作出相应处理。研究涉及人体、实验动物、人工智能等属于《科技伦理审查办法（试行）》（国科发监〔</span><span style="font-family: &quot;Times New Roman&quot;,serif;">2023</span><span style="font-family: 仿宋,仿宋_GB2312;">〕</span><span style="font-family: &quot;Times New Roman&quot;,serif;">167</span><span style="font-family: 仿宋,仿宋_GB2312;">号）第二条所列范围科技活动的项目，应按要求进行科技伦理审查。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">8.</span><span style="font-family: 仿宋,仿宋_GB2312;">严格落实审核推荐责任。项目申报单位对申报材料的真实性和合法性负有法人主体责任，严禁虚报项目、虚列预算、虚假出资、虚构事实及包装项目等弄虚作假行为。项目主管部门应切实强化审核推荐责任，对申报材料内容真实性进行严格把关，并会同同级社会信用管理部门对项目申报单位社会信用情况进行审查。省科技厅将会同驻厅纪检监察组对项目主管部门审核推荐情况进行抽查。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">9.</span><span style="font-family: 仿宋,仿宋_GB2312;">切实落实廉政风险防控要求。认真落实省科技厅党组关于全面从严治党和党风廉政建设有关工作要求，严格遵守厅系统干部职工廉洁履</span><span style="font-family: 仿宋,仿宋_GB2312;">职“十不准”等规定，坚决把好关键环节和重点岗位的廉政风险防控关口。对因“打招呼”“走关系”</span><span style="font-family: 仿宋,仿宋_GB2312;">等请托行为所获得的项目，将撤销立项资格，追回全部省资助经费，并对相关责任人或单位进行严肃处理。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体;">三、其他</span><span style="font-family: 黑体;">事项</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">1</span><span style="font-family: 仿宋,仿宋_GB2312;">.</span><span><span><span><span><span><span style="font-family: 仿宋,仿宋_GB2312;">请拟申报的老师将<span><b>绩效目标申请表（附件</b></span></span></span></span></span></span></span><span><span><span><span><span><span><span><b><span style="font-family: &quot;Times New Roman&quot;,serif;">2</span></b></span></span></span></span></span></span></span><span><span><span><span><span><span><span><b><span style="font-family: 仿宋,仿宋_GB2312;">）、项目预申报书（附件</span></b></span></span></span></span></span></span></span><span><span><span><span><span><span><span><b><span style="font-family: &quot;Times New Roman&quot;,serif;">3</span></b></span></span></span></span></span></span></span><span><span><span><span><span><span><span><b><span style="font-family: 仿宋,仿宋_GB2312;">）电子版</span></b></span></span></span></span></span></span></span><span><span><span><span><span><span style="font-family: 仿宋,仿宋_GB2312;">交至各单位科研秘书，各单位汇总后连同<b>汇总表（附件</b></span></span></span></span></span></span><span><span><span><span><span><b><span style="font-family: &quot;Times New Roman&quot;,serif;">4</span></b></span></span></span></span></span><span><span><span><span><span><b><span style="font-family: 仿宋,仿宋_GB2312;">）电子版</span></b></span></span></span></span></span><span style="font-family: 仿宋,仿宋_GB2312;">于</span><span><span><span><span><span><b><span style="font-family: &quot;Times New Roman&quot;,serif;">6</span></b></span></span></span></span></span><span><span><span><span><span><b><span style="font-family: 仿宋,仿宋_GB2312;">月</span></b></span></span></span></span></span><span><span><span><span><span><b><span style="font-family: &quot;Times New Roman&quot;,serif;">1</span></b></span></span></span></span></span><span><span><span><span><span><b><span style="font-family: 仿宋,仿宋_GB2312;">日前</span></b></span></span></span></span></span><span style="font-family: 仿宋,仿宋_GB2312;">发送至邮箱：</span><span style="font-family: &quot;Times New Roman&quot;,serif;">jylong</span><span style="font-family: 仿宋,仿宋_GB2312;">@</span><span style="font-family: &quot;Times New Roman&quot;,serif;">suda</span><span style="font-family: 仿宋,仿宋_GB2312;">.</span><span style="font-family: &quot;Times New Roman&quot;,serif;">edu</span><span style="font-family: 仿宋,仿宋_GB2312;">.</span><span style="font-family: &quot;Times New Roman&quot;,serif;">cn</span><span style="font-family: 仿宋,仿宋_GB2312;">。</span></p><p style="margin: 2.5pt 0cm 7.8pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 11pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">2</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">实行无纸化申报。申报材料在江苏数字科技平台</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">https</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">://</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">jsszkj</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">.</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">kxjst</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">.</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">jiangsu</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">.</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">gov</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">.</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">cn</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">/</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">js</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">-</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">home</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">/</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">home</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">）</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">提交</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">，</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">申报阶段不提供纸质版申报材料</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">，</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目申报单位及项目负责人科研诚信承诺书打印扫描后</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">，</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">以附件形式上传</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">，</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">其他项目附件材料应传尽传。</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">所有申报项目请于</span><span><span><span><span><span><span><span><b><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">6</span></b></span></span></span></span></span></span></span><span><span><span><span><span><span><span><b><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月</span></b></span></span></span></span></span></span></span><span><span><span><span><span><span><span><b><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">22</span></b></span></span></span></span></span></span></span><span><span><span><span><span><span><span><b><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日前</span></b></span></span></span></span></span></span></span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">在系统中提交。</span></p><p style="margin: 7.8pt 0cm 0pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 16pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif;">3</span><span style="font-family: 仿宋,仿宋_GB2312;">.</span><span style="font-family: 仿宋,仿宋_GB2312;">网上申报材料是后续形式（信用）审查、项目评审的依据，经主管部门在线确认提交后，一律不予退回重报。</span><span style="font-family: &quot;Times New Roman&quot;,serif;">2026</span><span style="font-family: 仿宋,仿宋_GB2312;">年拟立项目将在江苏数字科技平台进行公示，未立项项目不再另行通知。最终确定立项的项目，由项目主管部门通知承担单位提交纸质申报材料一式一份，申报材料统一用</span><span style="font-family: &quot;Times New Roman&quot;,serif;">A4</span><span style="font-family: 仿宋,仿宋_GB2312;">纸打印装订，按封面、项目信息表、单位信息表、项目申报书、绩效目标申报表、相关附件顺序装订成册（纸质封面，平装订）。</span></p><p style="margin: 2.5pt 0cm 7.8pt; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正仿宋_GBK; font-size: 11pt; -ms-text-autospace:; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">未尽事宜，请与科学技术研究院重点项目管理办公室陈智、龙佳宇联系，联系电话：</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">62768342</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">，我们将热忱为您服务。</span></p>&#13;
