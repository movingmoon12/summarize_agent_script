<strong id="title" style="font-family:宋体;font-size:36px; color:#000080;" align="center">苏州大学（江都高新区）新材料产业研究院关于遴选2026年度概念验证入库项目的通知（第二轮）</strong>&#13;

&#13;
<p style="font-family: 宋体; font-size: 16px;"/><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">各位老师：</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">为加快落实《苏州大学产研融合一体化创新行动方案（试行）》（苏大委〔<span>2024</span>〕<span>14</span>号）要求，助力学校科技成果快速走向市场，苏州大学产业技术研究院、苏州大学（江都高新区）新材料产业研究院、江苏省概念验证中心（苏州大学）面向全校科研人员征集<span>2026</span>年度概念验证入库项目并给予经费支持，具体通知如下：</span></p><p style="margin: 0cm 0cm 8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 黑体; font-size: 16pt;">一、 项目基本条件</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">1.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">拟验证项目要求对相关产业带动作用强、具有广泛应用前景，<b>研究领域不设限</b>。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">2.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">拟验证项目具有扎实的科研基础，已实施相关知识产权布局，尚未实现转化且未成立商业化公司、暂无社会资本参与。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">3.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目成果在技术上具有创新性和可行性，经济效益上具有良好的商业化潜力，预期通过概念验证可在江都高新区（含苏州创新飞地）形成商业化公司。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 黑体; font-size: 16pt;">二、 团队资格条件</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">1.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目负责人为苏州大学在职科研人员，且在项目执行期内为在职人员，原则上应具有博士学位或中级及以上专业技术职称；</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">2.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目团队应具有良好的研究基础、合理的人才梯队、较强的创新实力和相关成果转化能力，与江都高新技术产业开发区企业开展过联合科技攻关者优先。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">3.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目负责人及团队成员应符合科研诚信管理要求，具有良好的科研信用记录，以往科研项目执行、验收、经费情况良好，无知识产权纠纷。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">4.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目负责人应确保申请成果没有知识产权争议，项目概念验证完成后转化须按照学校相关管理规定进行审批，未经学校审批擅自转化的即予撤项、追回已拨经费并通报批评。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 黑体; font-size: 16pt;">三、申报流程</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">本轮立项数量为<b><span>2</span></b>项，<b>研究领域不设限</b>。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32.15pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">1.</span></b><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">材料填报</span></b></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目负责人填写《<span>2026</span>年度概念验证项目入库征集表》（见附件<span>1</span>），并提供项目前期立项支持情况及其他能够反映项目技术先进性、成熟度的相关证明材料、专利证书等。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32.15pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">2.</span></b><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">学院审核</span></b></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">各单位应对本单位报送的材料进行审核，确保《入库征集表》及附件材料无问题。审核通过的，学院主要领导在《入库征集表》上签署审核意见。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32.15pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">3.</span></b><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目遴选</span></b></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">概念验证中心将组织专家对申报项目从技术成熟度、应用价值、技术可行性等方面进行评审，遴选形成概念验证入库支持项目清单并进行公示，经公示无异议的，予以立项资助。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32.15pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">4.</span></b><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">考核评估</span></b></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目概念验证周期原则上不超过一年。验证周期内，项目需完成知识产权分析布局，开展小试、中试，形成可商品化的产品，明确商业化实施路径，并在<span>2027</span>年<span>2</span>月底前在江都高新区（含苏州创新飞地）落地注册。</span></p><p style="margin: 0cm 0cm 8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 黑体; font-size: 16pt;">四、支持政策</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32.15pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">1.</span></b><b><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">资金支持</span></b></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">根据概念验证项目遴选结果给予<b>每项<span>50</span>万元</b>的资金支持，主要用于实验室验证所需的材料费、测试化验加工费、知识产权事务费等相关费用。经费分次拨付，立项后拨付经费的<span>40%</span>，中期检查且首批资金使用完毕后拨付剩余<span>60%</span>。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">科研团队需严格按照经费管理办法，确保该专项资金专款专用，项目验收后尚未使用完毕的，学校将收回相关结余经费。</span></p><p style="margin: 0cm 0cm 8pt 32.15pt; text-align: justify; line-height: 150%; font-family: &quot;等线 Light&quot;; font-size: 11pt; font-weight: bold; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">2.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">场地支持</span></p><p style="margin: 0cm 0cm 8pt; text-align: justify; line-height: 150%; font-family: &quot;等线 Light&quot;; font-size: 11pt; font-weight: bold; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt; font-weight: normal;">    </span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt; font-weight: normal;">以商业化公司的形式在江都高新区（含苏州创新飞地）开展转化的项目可优先免费使用办公场地。</span></p><p style="margin: 0cm 0cm 8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 黑体; font-size: 16pt;">五、其他事项</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">1.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">项目验证阶段所产生的知识产权需要与江都高新区共享；</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">2.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">如概念验证项目出库且在江都高新区（含苏州创新飞地）成立公司，则江都高新区无偿归还所持共有的知识产权；</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">3.</span><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">若项目概念验证未通过，或者老师中途选择退出验证，则概念验证阶段所产生知识产权在进行出售、拍卖或协议转让等方式处理时，优先用于偿还江都高新区对于该概念验证项目的全部投入。</span></p><p style="margin: 0cm 0cm 8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 黑体; font-size: 16pt;">六、材料提交及时间节点</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">请各技术团队于<span>5</span>月<span>28</span>日<span>17:00</span>前，填写《概念验证项目入库申请表》电子版、经费预算单（详见附件<span>1</span>）发送至<span>yurenyan@suda.edu.cn</span>，邮件以“概念验证<span>+</span>姓名<span>+</span>项目名称”方式命名，同时打印纸质材料一式六份（无需胶装）于<span>5</span>月<span>29</span>日<span>17:00</span>前提交至独墅湖校区<span>704</span>楼<span>303</span>办公室。</span></p><p style="margin: 0cm 0cm 7.8pt; text-align: justify; line-height: 150%; text-indent: 32pt; font-family: 等线; font-size: 11pt; -ms-text-justify: inter-ideograph;"><span style="line-height: 150%; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">未尽事宜，欢迎与苏州大学（江都高新区）新材料产业研究院管理委员会联系，联系人：俞仁琰，联系电话：<span>65882903</span>、<span>13862562051</span>。</span></p><p style="margin: 0cm 0cm 8pt; line-height: 115%; font-family: 等线; font-size: 11pt;"><span> </span></p> &#13;
