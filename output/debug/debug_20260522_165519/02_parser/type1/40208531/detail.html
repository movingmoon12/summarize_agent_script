<strong id="title" style="font-family:宋体;font-size:36px; color:#000080;" align="center">关于做好2026年5月全国大学英语四、六级口语考试工作的通知</strong>&#13;

&#13;
<p style="font-family: 宋体; font-size: 16px;"/><p align="center" style="margin: 0cm; text-align: center; font-family: 方正小标宋简体; font-size: 16pt; -ms-layout-grid-mode: char; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312;">教字〔<span>2026</span>〕108 号</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">各学院（部）：</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">根据省教育考试院《关于</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">2026</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">年上半年全国大学英语四、六级考试报名工作有关事宜的通知》精神，</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">2026</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">年</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">5</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月全国大学英语四、六级口语考试（简称</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">CET-SET</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">）将于</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">5</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">23</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">—24</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日举行，为确保此项工作顺利实施，现将有关事项通知如下：</span></p><p style="margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正小标宋简体; font-size: 16pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 黑体;">一、考试时间</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">5</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">23</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日（周六）四级口试（</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">F261</span><b><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">次</span></b><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">），</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">9:15</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">开始，全天一场；</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">5</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">24</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日（周日）六级口试（</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">S262</span><b><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">次</span></b><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">），</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">9:15</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">开始，全天两场。</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">具体考试时间及场次安排详见准考证。</span></p><p style="margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正小标宋简体; font-size: 16pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 黑体;">二、报到及考试地点</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">1.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">报到地点：考生于考试当天根据准考证上的考试开始时间，提前半小时到达天赐庄校区校本部理工大楼西</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">153</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">（候考室）报到并参加考前培训；</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">2.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">考试地点：天赐庄校区校本部理工大楼西一楼</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">138</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">、</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">145</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">机房。</span></p><p style="margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正小标宋简体; font-size: 16pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 黑体;">三、注意事项</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">1.5</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">19</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日起，报名成功的考生登录报名网站（网址：</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">http://cet-bm.neea.edu.cn</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">），自行打印准考证。如忘记通行证密码，可通过邮箱重置；</span></p><p style="margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正小标宋简体; font-size: 16pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif;">2.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312;">考试开始后迟到考生不得入场；</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">3.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">考生进入候考室及考场时必须携带<b>准考证原件</b>及<b>身份证原件</b>备查（缺一不可），其他证件无效；</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">4.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">上机考试，请考生自备鞋套；</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">5.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">考生不允许携带任何书籍、笔、笔记本、草稿纸、计算器、软盘、移动存储设备、录音机（器）、移动通信器材等与考试无关的物品进入考场</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">;</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">6.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">请考生提前阅读附件，了解口语考试的内容及流程。</span></p><p style="margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 方正小标宋简体; font-size: 16pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 黑体;">四、其他事项</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">1.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">为保证考试的正常进行，理工大楼</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">153</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">教室</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">5</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">23</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">—24</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日停止上课。理工大楼</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">138</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">、</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">145</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">机房</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">5</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">22</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日（周五）</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">12:00</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">起至</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">5</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">24</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">16:00</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">停止开放。</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">5</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">月</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">23</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">—24</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">日相关课程请与教务处教务管理科（电话：</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">67160965</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">）联系安排调课所需教室，并请相关单位及时通知任课教师和学生；</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 16pt;">2.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">请有关校区的供电管理部门做好考前准备工作，确保考试期间的正常供电。</span></p><p style="background: white; margin: 0cm; text-align: justify; line-height: 29pt; text-indent: 32pt; font-family: 宋体; font-size: 12pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 16pt;">特此通知。</span></p><p/>&#13;

function flashChecker(){&#13;
	var hasFlash=0;　　　　//是否安装了flash&#13;

	if(document.all){&#13;
