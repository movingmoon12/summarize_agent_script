<p style="font-family: 宋体; font-size: 16px;"/><p class="MsoNormal" style="text-align: center; line-height: 29pt; margin-bottom: 0pt; punctuation-wrap: simple; mso-line-height-rule: exactly;"><span style="background: rgb(255, 255, 255); color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: &quot;Times New Roman&quot;; mso-font-kerning: 1.0000pt; mso-shading: rgb(255, 255, 255);"><font face="仿宋">社科字〔</font><font face="Times New Roman">2026</font><font face="仿宋">〕</font><font face="Times New Roman">36</font><font face="仿宋">号</font></span><span style="background: rgb(255, 255, 255); color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 1.0000pt; mso-shading: rgb(255, 255, 255); mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="仿宋">各有关单位：</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="仿宋">根据《省教育厅办公室关于做好</font><font face="Times New Roman">2026</font><font face="仿宋">年度高校哲学社会科学研究项目申报工作的通知》（苏教办社政函〔</font><font face="Times New Roman">2026</font><font face="仿宋">〕</font><font face="Times New Roman">9</font><font face="仿宋">号）要求，结合我校实际情况，现将有关申报安排通知如下。</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="黑体">一、</font></span><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="黑体">申报内容</font></span><span style="color: rgb(0, 0, 0); font-family: 黑体; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><font face="仿宋">（一）</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="仿宋">项目类别</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="Times New Roman">1</font><font face="仿宋">．</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><font face="仿宋">江苏高校哲学社会科学研究重大项目（以下简称重大项目），研究周期为</font>3<font face="仿宋">年。</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="Times New Roman">2</font><font face="仿宋">．</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><font face="仿宋">江苏高校哲学社会科学研究一般项目（以下简称一般项目），研究周期为</font>2<font face="仿宋">年。</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="仿宋">（二）申报学科范围</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><font face="仿宋">（</font>1<font face="仿宋">）马克思主义；（</font><font face="Times New Roman">2</font><font face="仿宋">）思想政治教育；（</font><font face="Times New Roman">3</font><font face="仿宋">）哲学；（</font><font face="Times New Roman">4</font><font face="仿宋">）逻辑学；（</font><font face="Times New Roman">5</font><font face="仿宋">）宗教学；（</font><font face="Times New Roman">6</font><font face="仿宋">）语言学；（</font><font face="Times New Roman">7</font><font face="仿宋">）中国文学；（</font><font face="Times New Roman">8</font><font face="仿宋">）外国文学；（</font><font face="Times New Roman">9</font><font face="仿宋">）艺术学；（</font><font face="Times New Roman">10</font><font face="仿宋">）历史学；（</font><font face="Times New Roman">11</font><font face="仿宋">）考古学；（</font><font face="Times New Roman">12</font><font face="仿宋">）经济学；（</font><font face="Times New Roman">13</font><font face="仿宋">）管理学；（</font><font face="Times New Roman">14</font><font face="仿宋">）政治学；（</font><font face="Times New Roman">15</font><font face="仿宋">）法学；（</font><font face="Times New Roman">16</font><font face="仿宋">）社会学；（</font><font face="Times New Roman">17</font><font face="仿宋">）民族学与文化学；（</font><font face="Times New Roman">18</font><font face="仿宋">）新闻学与传播学；（</font><font face="Times New Roman">19</font><font face="仿宋">）图书馆、情报与文献学；（</font><font face="Times New Roman">20</font><font face="仿宋">）教育学；（</font><font face="Times New Roman">21</font><font face="仿宋">）心理学；（</font><font face="Times New Roman">22</font><font face="仿宋">）体育学；（</font><font face="Times New Roman">23</font><font face="仿宋">）统计学；（</font><font face="Times New Roman">24</font><font face="仿宋">）港澳台问题研究；（</font><font face="Times New Roman">25</font><font face="仿宋">）国际问题研究；（</font><font face="Times New Roman">26</font><font face="仿宋">）交叉学科</font><font face="Times New Roman">/</font><font face="仿宋">综合研究（按照</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-font-kerning: 0.0000pt;"><font face="仿宋">“靠近优先”</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><font face="仿宋">原则，根据选题方向和研究重点，备注</font>1<font face="仿宋">个主要学科）。</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="仿宋">（三）研究内容</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><font face="仿宋">本次申报不发布</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="仿宋">分学科</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><font face="仿宋">选题指南，申请人结合自身研究基础和学术专长，自拟选题，鼓励围绕重点研究方向开展研究（详见附件</font></span><span style="color: rgb(0, 0, 0); font-family: 仿宋; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-ascii-font-family: &quot;Times New Roman&quot;; mso-hansi-font-family: &quot;Times New Roman&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt;"><font face="Times New Roman">1</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><font face="仿宋">）。</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><o:p/></span></p><p align="justify" class="p" style="background: rgb(255, 255, 255); margin: 0pt 0px; text-align: justify; line-height: 1.5; text-indent: 32pt; -ms-text-justify: inter-ideograph; punctuation-wrap: simple; mso-line-height-rule: exactly; mso-char-indent-count: 2.0000;"><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-family: 仿宋;"><font face="仿宋">重大项目应围绕国家和我省经济社会发展重大理论和实践问题、哲学社会科学重要基础和前沿问题，开展原创性研究，鼓励学科交叉。申请人应具有较好的前期研究基础，预期成果体量和质量应高于一般项目。</font></span><span style="color: rgb(0, 0, 0); font-family: &quot;Times New Roman&quot;; font-size: 16pt; mso-spacerun: &quot;yes&quot;; mso-bidi-font-family: 宋体; mso-font-kerning: 0.0000pt; mso-fareast-font-famil
