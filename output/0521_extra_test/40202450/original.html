<strong id="title" style="font-family:宋体;font-size:36px; color:#000080;" align="center">关于举办苏州大学第九届“惠寒”志愿服务项目大赛的通知</strong>&#13;
<hr width="800px" size="3" align="center" color="#3F8080"/>&#13;
</td>&#13;

<tr valign="top">&#13;
<td style="font-family:仿宋_GB2312;font-size:16px;line-height:150%;" id="content" class="_c">&#13;
&#13;
<p style="font-family: 宋体; font-size: 16px;"/><p align="center" style="margin: 0cm; text-align: center; line-height: 27pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">团苏大委</span><span style="background: white; color: black; font-family: &quot;微软雅黑&quot;,sans-serif; font-size: 15pt;">﹝</span><span style="background: white; color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2026</span><span style="background: white; color: black; font-family: &quot;微软雅黑&quot;,sans-serif; font-size: 15pt;">﹞</span><span style="background: white; color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">42</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">号</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">各团委、直属团支部，各学院（部）青协分会：</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">为学习贯彻习近平总书记关于青年工作的重要思想和志愿服务的系列重要指示批示精神，贯彻落实《关于健全新时代志愿服务体系的意见》，深入挖掘、培育、推广主题鲜明、独具特色、群众欢迎的志愿服务项目，更好动员引领青年学子为中国式现代化挺膺担当。经研究决定，举办苏州大学第九届“惠寒”志愿服务项目大赛（以下简称大赛）。现将有关事项通知如下：</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">一、活动主题</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">燃“惠寒”薪火，赴志愿新程</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">二、活动目的</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">传承发扬“惠寒”精神，进一步深化拓展“惠寒”社区青春行动</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">以大赛为契机，传承发扬“惠寒”精神，传播志愿服务理念，促进“惠寒”青年志愿服务走进社区、走进乡村、走进基层，推动寒暑假集中服务和周末常态化服务相结合、社区要求和居民实际需求相结合，围绕文化体育、生态环保、文明实践、法治宣传、卫生健康等内容，推动青年志愿者助老、助残、留守儿童关爱及其他特色的社区志愿服务项目走深走实。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">培养和扶持一批示范型“惠寒”志愿服务项目</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">以大赛为平台，展现我校志愿服务成果，发掘出一批服务覆盖面广、社会反响好、可持续性强、具有引导价值和时代特色的志愿服务项目，予以相应培育支持；促进志愿服务组织间学习借鉴、交流合作，培育支持一批活动规范有序、作用发挥显著的志愿服务组织。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">推进全校范围“学雷锋”活动与“惠寒”品牌建设相结合</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">以大赛为载体，以习近平新时代中国特色社会主义思想为指导，深入学习贯彻党的二十大和二十届历次全会精神，认真落实党的二十届四中全会工作部署，深刻把握习近平总书记对深入开展学雷锋活动重要指示精神的深邃要义和丰富内涵，提升我校青年志愿者的创新意识，将传承弘扬雷锋精神融入“惠寒”志愿文化建设中，积极探索新时代学雷锋活动常态化、机制化、项目化的模式与方法，进一步培育和塑造具有鲜明“惠寒”特色的品牌项目。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">三、活动时间</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2026</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">年</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月—</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">6</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">四、申报条件</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">各单位应围绕大赛主题，做好志愿服务项目遴选工作。本次大赛共分为两个赛道：</span></p><p align="left" style="margin: 0cm; text-align: left; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 楷体,楷体_GB2312; font-size: 15pt;">（一）青年志愿服务项目赛道：</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">社会各领域实施的各类志愿服务项目，申报当年项目正在实施，且连续实施时间原则上不少于</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">年；项目有长期开展的趋势。</span></p><p align="left" style="margin: 0cm; text-align: left; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">项目定位明确，体现新时代文明实践要求，获得普遍欢迎和认可。项目具备完整的工作方案、规范的管理制度、科学的运作模式。持续稳定开展，参与人数具有一定广泛性，参与活动的注册志愿者原则上不少于</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">10</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">人。具有一定的创新性和示范性，可复制、可推广。</span></p><p align="left" style="margin: 0cm; text-align: left; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 楷体,楷体_GB2312; font-size: 15pt;">（二）公益创业赛道：</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">由志愿者、志愿服务组织发起的，以解决社会公共需求为使命，具有一定商业模式的创业项目，目标内容合理，项目管理规范，形成服务产品，保障发展可持续。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">同时能够兼顾弘扬志愿精神，服务青少年事业。公益创业模式具有可持续发展能力，已持续运营</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">年以上，获得支持资金</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">万元以上，具有一定的社会影响力。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">申报类别主要包括乡村振兴、“小组团”专项、为老服务、关爱少年儿童、环境保护、文明实践、卫生健康、应急救援、社区治理与邻里守望、文化传播与旅游服务等</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">10</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">类。（申报类别说明见附件</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">4</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">）</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">申报项目只能选择青年志愿服务项目赛道或公益创业赛其中一种方式参赛，重复申报将取消参赛名额。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">已在往届项目大赛中获得过一、二等奖的项目原则上不再参加，项目内容、形式确有拓展或创新的，重点对其拓展创新部分予以展示。在国家级、省级志愿服务展示交流会、志愿服务项目大赛已获得金奖的项目不得申报。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">五、评审标准</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 楷体,楷体_GB2312; font-size: 15pt;">（一）青年志愿服务项目</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">目标明确。深刻把握雷锋精神的时代内涵和实践要求。项目实施前经过充分的调研论证，项目实施能够解决一定的社会问题或能在一定程度上预防社会问题的发生，<span style="background: white;">落实学雷锋活动的实践要求，</span>有助于推动社会主义精神文明建设和社会治理，有利于发挥社会主义核心价值观的引领作用。服务对象明确，服务范围清晰，服务内容合理，服务方式恰当有效。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">管理规范。项目运营团队相对稳定，核心成员不少于</span><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">人，有民主决策机制。服务内容、服务模式具有明显的志愿性。项目有计划、有总结，招募培训、注册登记、服务管理、记录认证、激励保障、宣传推广等环节规范有序。项目经费预算合理，资金管理透明。能定期开展项目评估和改进升级，形成常态化运行机制。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">成效明显。服务时间、服务次数安排合理。项目实施具有较高的专业性。能够满足服务对象的切实需求，服务对象的生活状态或环境有显著改善，受到服务对象、社会群众和当地党政部门的认可。志愿者在服务过程中得到成长，体现实践育人的效果。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">4.</span><span style="background: white; color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">善于创新。</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">具有创造性思维，积极探索创新工作模式，能够推动新时代学雷锋活动不断拓展内容、创新形式、丰富载体，能够创造性地解决社会问题。善于运用互联网、自媒体等工具提升志愿服务项目的管理水平和实施效果。对重大突发事件具有较强的应急响应能力。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">影响广泛。能够得到受益对象和有关党政部门认可，参与人员评价较好，在当地志愿服务领域具有较强的影响力和示范带动作用，受到各类媒体的关注和认可，项目美誉度较高。注重传统媒体和新媒体宣传，社会各界反响良好，新闻宣传报道广泛，在各类志愿服务项目大赛及交流活动中表现优秀。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: 楷体,楷体_GB2312; font-size: 15pt;">（二）公益创业项目</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">社会价值显著。项目受益者明确，发展目标清晰，能够灵活运用市场机制和志愿机制，针对受益对象需要解决的重要问题，提供产品或服务，满足社会需求或预防社会问题发生，能够发挥社会主义核心价值观的引领作用，具备可持续发展的基础和条件。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">运营保障到位。项目建立了合作共赢的伙伴网络，专业化参与项目产品或服务分工与整合，运营能力较强，整合资源、筹集资金能力较强，资金使用及资源配置合理，实现财务的可持续发展。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">组织治理规范。项目实施主体建立了党建引领、权责明确、监督透明、公信可靠的治理架构，组织治理规范，管理制度健全，核心成员稳定，专业能力互补协同，具备较强的内部治理能力。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">4.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">公益创业模式合理。项目模式清晰，定位合理，合理运用了商业手段，形成了服务产品，形成了解决社会问题的创新方式，具有实践的可行性及发展的可持续性，具有一定志愿服务相关性。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5.</span><span style="color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">社会影响力强。项目服务或产品利益相关者满意度高，实现了社会价值或公益价值目标，社会评价良好，媒体报道较多，具有一定的品牌影响力，对社会与环境产生积极影响。能够得到党政有关部门、服务对象支持认可，获得表彰奖励奖项较多。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">六、活动流程</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">申报推荐（</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">19</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">日—</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">25</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">日）</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">各单位积极组织开展大赛宣传工作，广泛动员引导各类志愿服务组织进行项目申报，并对申报项目进行初选，各学院每赛道可申报</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">—</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">个项目，两赛道合计申报总数不超过</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">个（苏州医学院不超过</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">个）。申报项目的团队负责人只能担任</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">个项目的负责人，项目成员最多参与</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">个项目（包括青年志愿服务项目赛道和公益创业赛）。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">所有申请材料严格按照项目申报表（见附件</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">、</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">）和项目申报汇总表（见附件</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">）进行填报。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-word-break: break-all; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">各单位统一将附件</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">或附件</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">、附件</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">电子版及加盖公章扫描版，和各项目开展活动的</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">张典型照片（</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">JPG</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">格式，照片大小不低于</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1M</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">）打包至一个文件夹内并压缩，压缩包命名为“单位名称</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">+</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">‘惠寒’志愿服务项目大赛</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">+</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">赛道”，于</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">25</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">日（周一）</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">12:00</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">前打包发送至对应邮箱，两个赛道材料分开发送，青年志愿服务项目赛道的材料发送至</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3363338750@qq.com</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">，公益创业赛道的材料发送至</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2428972383@qq.com</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">，邮件标题为“单位名称</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">+</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">‘惠寒’志愿服务项目大赛</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">+</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">赛道”。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">项目初评遴选（</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">26</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">日—</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">6</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">日）</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">校团委、校青年志愿者协会组织评委依据参赛主体和申报类别对志愿服务项目的志愿性和合法性、申报材料填写规范性、参赛项目重复性等内容进行初评，确定入围决赛的项目，并在校团委官方平台通知。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">集中评比（</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">6</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月上旬，另行通知）</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">分赛道通过网络宣传、新媒体展示、现场答辩、综合评议等环节，决出获奖项目。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">七、活动表彰</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">参赛项目将按项目类别分组分赛道评定，青年志愿服务项目赛道和公益创业赛道分别设置一、二、三等奖。校团委将重点培育、推荐优秀项目参加全国、省、市各级志愿服务项目大赛、公益创业赛道、志愿服务项目展示交流会等，并在社会实践立项等工作中给予重点扶持。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">对宣传发动、资源对接、挖掘培育等方面工作突出的单位，颁发优秀组织奖。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">八、工作要求</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="background: white; color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1.</span><span style="background: white; color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">强化组织协调。各单位要高度重视、精心组织，丰富拓展学雷锋活动的平台载体，对参赛项目提供帮助支持，有力有序推进各项工作。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="background: white; color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2.</span><span style="background: white; color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">强化宣传发动。各单位要广泛发动、全面动员，积极推荐优秀的志愿服务项目，进一步扩大活动的影响力和覆盖面。</span></p><p style="background: white; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 12pt; margin-right: 0cm; margin-left: 0cm; -ms-text-justify: inter-ideograph;"><span style="background: white; color: black; font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3.</span><span style="background: white; color: black; font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">强化典型选树。各单位要注重典型选树和培养，加大对本单位往届获奖对象的宣传力度，充分发挥典型的引导示范作用，努力在全校营造积极参与学雷锋活动、投入志愿服务、奉献服务学校和社会发展的良好氛围。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">九、参赛答疑</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">各单位有意向参赛的项目负责人可使用</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">QQ</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">扫描下方二维码，加入通知答疑群，在群内进行报名工作咨询。</span></p><p align="left" style="margin: 0cm; text-align: left; line-height: 27pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span/></p><table align="left" cellspacing="0" cellpadding="0">  <tbody>    <tr>      <td width="176" height="0"/>    </tr>    <tr>      <td/>      <td><img width="298" height="274" src="/defaultroot/upload/html/20260518144507661001.jpg"/></td>    </tr>  </tbody></table><br clear="ALL"/><p/><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 黑体; font-size: 15pt;">十、注意事项</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">1.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">注意材料提交形式的规范。照片大小、文件命名等都需要符合要求，若有材料提交不规范、重新提交、反复修改等情况，评审单位将会对该项目团队酌情扣分。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">2.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">注意材料提交的截止时间。初评遴选所有材料都需要在</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">5</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">月</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">25</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">日中午</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">12:00</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">前上交完毕，逾期不接受材料更改、提交。</span></p><p style="margin: 0cm; text-align: justify; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">3.</span><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">注意两赛道分设不同邮箱，请勿提交至错误邮箱。</span></p><p align="left" style="margin: 0cm; text-align: left; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">联系方式：</span></p><p align="left" style="margin: 0cm; text-align: left; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">校团委，马老师，</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">67160410</span></p><p align="left" style="margin: 0cm; text-align: left; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">政治与公共管理学院团委，张老师，</span><span style="font-family: &quot;Times New Roman&quot;,serif; font-size: 15pt;">65880163</span></p><p align="left" style="margin: 0cm; text-align: left; line-height: 27pt; text-indent: 30pt; font-family: 等线; font-size: 10.5pt; -ms-text-justify: inter-ideograph;"><span style="font-family: 仿宋,仿宋_GB2312; font-size: 15pt;">特此通知。</span></p>&#13;
